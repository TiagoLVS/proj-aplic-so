[gestores]
192.168.56.11

[publico]
192.168.56.12

[all:vars]
ansible_user=vagrant
# Utilizando a chave SSH privada padrão que o Vagrant cria.
# Como a pasta do projeto é montada automaticamente em /vagrant pelo VirtualBox/Vagrant,
# a forma mais robusta e dinâmica de usar as chaves sem precisar copiá-las é
# acessando o diretório .vagrant diretamente. Mas para fins de manter o ambiente simples:
# Se utilizarmos uma chave única, seria:
# ansible_ssh_private_key_file=/home/vagrant/.ssh/id_rsa
# Mas para chaves geradas pelo próprio Vagrant nas VMs (default):
ansible_ssh_private_key_file=/vagrant/.vagrant/machines/gestor-server/virtualbox/private_key
# E ignorar verificação de chaves do host para simplificar o laboratório
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
